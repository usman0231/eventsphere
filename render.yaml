# Render Blueprint — one free web service that builds the React client AND runs the
# Express server (which serves the built client via SERVE_CLIENT=1). Deploy from GitHub.
# Set MONGO_URI (MongoDB Atlas) and ANTHROPIC_API_KEY in the Render dashboard.
services:
  - type: web
    name: eventsphere
    runtime: node
    plan: free
    buildCommand: npm install --prefix server && npm install --prefix client && CI=false npm run build --prefix client
    startCommand: node server/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: "1"
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: MONGO_URI
        sync: false                  # set manually (your Atlas connection string)
      - key: ANTHROPIC_API_KEY
        sync: false                  # optional — enables the AI chatbot
